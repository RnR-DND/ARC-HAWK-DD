apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hawk-alerts
  namespace: hawk
  labels:
    app.kubernetes.io/name: hawk-alerts
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: hawk
    release: prometheus
spec:
  groups:
    # --- Dead Letter Queue Alerts ---
    - name: hawk.dlq
      rules:
        - alert: HawkDLQDepthCritical
          expr: |
            redis_list_length{list=~".*_dlq", namespace="hawk"} > 100
          for: 5m
          labels:
            severity: critical
            team: hawk
          annotations:
            summary: "DLQ depth exceeds 100 on {{ $labels.list }}"
            description: "Dead letter queue {{ $labels.list }} has {{ $value }} messages pending. Tasks are failing consistently and require manual investigation."
            runbook_url: "https://docs.arl.io/hawk/runbooks/dlq-overflow"

        - alert: HawkDLQDepthWarning
          expr: |
            redis_list_length{list=~".*_dlq", namespace="hawk"} > 50
          for: 10m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "DLQ depth approaching threshold on {{ $labels.list }}"
            description: "Dead letter queue {{ $labels.list }} has {{ $value }} messages. Investigate before it reaches critical threshold of 100."

    # --- Scan Failure Rate ---
    - name: hawk.scans
      rules:
        - alert: HawkScanFailureRateHigh
          expr: |
            (
              sum(rate(hawk_scan_failures_total{namespace="hawk"}[5m]))
              /
              sum(rate(hawk_scan_total{namespace="hawk"}[5m]))
            ) > 0.05
          for: 10m
          labels:
            severity: critical
            team: hawk
          annotations:
            summary: "Scan failure rate exceeds 5%"
            description: "{{ $value | humanizePercentage }} of scans are failing over the last 10 minutes. Check scanner logs and connector health."
            runbook_url: "https://docs.arl.io/hawk/runbooks/scan-failure-rate"

        - alert: HawkScanDurationHigh
          expr: |
            histogram_quantile(0.95, sum(rate(hawk_scan_duration_seconds_bucket{namespace="hawk"}[5m])) by (le, connector_type))
            > 300
          for: 15m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "Scan P95 latency exceeds 5 minutes for {{ $labels.connector_type }}"
            description: "P95 scan duration for connector {{ $labels.connector_type }} is {{ $value }}s. Consider scaling up or investigating slow connectors."

    # --- Agent Offline ---
    - name: hawk.agents
      rules:
        - alert: HawkAgentOffline
          expr: |
            (time() - hawk_agent_last_seen_timestamp{namespace="hawk"}) > 86400
          for: 1h
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "EDR Agent {{ $labels.agent_id }} offline > 24h"
            description: "Agent {{ $labels.agent_id }} on host {{ $labels.hostname }} has not reported in {{ $value | humanizeDuration }}. Check agent process and network connectivity."
            runbook_url: "https://docs.arl.io/hawk/runbooks/agent-offline"

        - alert: HawkAgentOfflineCritical
          expr: |
            (time() - hawk_agent_last_seen_timestamp{namespace="hawk"}) > 259200
          for: 1h
          labels:
            severity: critical
            team: hawk
          annotations:
            summary: "EDR Agent {{ $labels.agent_id }} offline > 72h"
            description: "Agent {{ $labels.agent_id }} on host {{ $labels.hostname }} has not reported in {{ $value | humanizeDuration }}. Likely requires manual intervention."

    # --- Risk Tier Changes ---
    - name: hawk.risk
      rules:
        - alert: HawkRiskTierEscalation
          expr: |
            increase(hawk_risk_tier_change_total{direction="escalation", namespace="hawk"}[1h]) > 0
          for: 0m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "Risk tier escalation detected"
            description: "{{ $value }} sources had their risk tier escalated in the last hour. Review in the risk dashboard."

        - alert: HawkCriticalRiskSources
          expr: |
            hawk_risk_sources_by_tier{tier="critical", namespace="hawk"} > 10
          for: 5m
          labels:
            severity: critical
            team: hawk
          annotations:
            summary: "More than 10 critical risk sources"
            description: "{{ $value }} sources are rated as critical risk. Immediate remediation review recommended."

    # --- Pod Health ---
    - name: hawk.pods
      rules:
        - alert: HawkPodRestartLoop
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="hawk"}[1h]) > 5
          for: 10m
          labels:
            severity: critical
            team: hawk
          annotations:
            summary: "Pod {{ $labels.pod }} restarting frequently"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last hour. Check container logs."

        - alert: HawkPodCrashLooping
          expr: |
            max_over_time(kube_pod_container_status_waiting_reason{namespace="hawk", reason="CrashLoopBackOff"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            team: hawk
          annotations:
            summary: "Pod {{ $labels.pod }} is CrashLoopBackOff"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is in CrashLoopBackOff state."

        - alert: HawkPodNotReady
          expr: |
            kube_pod_status_ready{namespace="hawk", condition="true"} == 0
          for: 10m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "Pod {{ $labels.pod }} not ready"
            description: "Pod {{ $labels.pod }} has been in a non-ready state for more than 10 minutes."

    # --- Queue Depth ---
    - name: hawk.queues
      rules:
        - alert: HawkQueueBacklogHigh
          expr: |
            redis_list_length{list=~"scan_default|classify|ingest_streaming|ingest_cloud|ingest_agent|remediation|escalation", namespace="hawk"} > 1000
          for: 15m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "Queue {{ $labels.list }} backlog exceeds 1000"
            description: "Queue {{ $labels.list }} has {{ $value }} pending tasks. Consider scaling workers or investigating processing bottlenecks."

        - alert: HawkStreamingLagCritical
          expr: |
            redis_list_length{list="ingest_streaming", namespace="hawk"} > 10000
          for: 5m
          labels:
            severity: critical
            team: hawk
          annotations:
            summary: "Streaming ingest queue lag exceeds 10k"
            description: "Kafka/Kinesis streaming ingest queue has {{ $value }} pending messages. Real-time processing is severely delayed."

    # --- API Latency ---
    - name: hawk.api
      rules:
        - alert: HawkAPILatencyP99High
          expr: |
            histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace="hawk", service="hawk-backend"}[5m])) by (le))
            > 5
          for: 10m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "Backend API P99 latency exceeds 5s"
            description: "P99 API response time is {{ $value }}s. Check database performance, connection pool, and resource limits."

        - alert: HawkAPIErrorRateHigh
          expr: |
            (
              sum(rate(http_requests_total{namespace="hawk", service="hawk-backend", status=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{namespace="hawk", service="hawk-backend"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
            team: hawk
          annotations:
            summary: "Backend API 5xx error rate exceeds 5%"
            description: "{{ $value | humanizePercentage }} of API requests are returning 5xx errors."

    # --- Classification Pipeline ---
    - name: hawk.classification
      rules:
        - alert: HawkClassificationLatencyHigh
          expr: |
            histogram_quantile(0.95, sum(rate(hawk_classification_duration_seconds_bucket{namespace="hawk"}[5m])) by (le, layer))
            > 30
          for: 10m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "Classification P95 latency exceeds 30s on layer {{ $labels.layer }}"
            description: "Layer {{ $labels.layer }} P95 classification duration is {{ $value }}s."

        - alert: HawkLLMFallbackRateHigh
          expr: |
            (
              sum(rate(hawk_llm_fallback_total{namespace="hawk"}[5m]))
              /
              sum(rate(hawk_llm_requests_total{namespace="hawk"}[5m]))
            ) > 0.30
          for: 15m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "LLM fallback rate exceeds 30%"
            description: "{{ $value | humanizePercentage }} of LLM classification requests are falling back to L2. Check Claude API connectivity and timeouts."
