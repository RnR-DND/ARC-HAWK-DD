apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hawk-backend
  namespace: hawk
  labels:
    app.kubernetes.io/name: hawk-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: hawk
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hawk-backend
  namespaceSelector:
    matchNames:
      - hawk
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "go_.*"
          action: keep
        - sourceLabels: [__name__]
          regex: "hawk_.*"
          action: keep
        - sourceLabels: [__name__]
          regex: "http_.*"
          action: keep
        - sourceLabels: [__name__]
          regex: "process_.*"
          action: keep
