name: Regression Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  regression:
    name: Classifier & Scanner Regression
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/goScanner/go.sum

      - name: Download scanner dependencies
        working-directory: apps/goScanner
        run: go mod download

      - name: Run classifier regression tests
        working-directory: apps/goScanner
        run: go test ./internal/classifier/... -v -timeout 2m

      - name: Run connector regression tests
        working-directory: apps/goScanner
        run: go test ./internal/connectors/... -v -short -timeout 2m

      - name: Run orchestrator regression tests
        working-directory: apps/goScanner
        run: go test ./internal/orchestrator/... -v -short -timeout 3m

      - name: Check classifier quality gate
        working-directory: apps/goScanner
        run: |
          RESULT=$(go test ./internal/classifier/... -v 2>&1)
          PASS=$(echo "$RESULT" | grep -c "^--- PASS:" || true)
          FAIL=$(echo "$RESULT" | grep -c "^--- FAIL:" || true)
          TOTAL=$((PASS + FAIL))
          echo "Tests: $PASS passed, $FAIL failed out of $TOTAL"
          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(awk "BEGIN {printf \"%.2f\", $PASS / $TOTAL}")
            echo "Pass rate: $RATE"
            awk "BEGIN { if ($RATE < 0.90) { print \"Quality gate failed: pass rate \" $RATE \" < 0.90\"; exit 1 } print \"Quality gate passed\" }"
          fi
