name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  gosec:
    name: Go Security Scan (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/backend/go.sum

      - name: Run gosec (backend)
        working-directory: apps/backend
        # Advisory: results uploaded as SARIF, not blocking the build
        # Remove `|| true` once all gosec findings are addressed
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt sarif -out gosec-results.sarif ./... || true
          gosec -fmt text ./... || true

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: apps/backend/gosec-results.sarif
          category: gosec
        continue-on-error: true

      - name: Run gosec (scanner)
        working-directory: apps/goScanner
        run: |
          gosec -fmt text ./... || true

  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/backend/go.sum

      - name: Run govulncheck (backend)
        working-directory: apps/backend
        # Advisory until all known vulns in deps are resolved or accepted
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

      - name: Run govulncheck (scanner)
        working-directory: apps/goScanner
        run: govulncheck ./... || true

  container-scan:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t arc-hawk-backend:scan-test apps/backend/

      - name: Trivy — CRITICAL only (blocking gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arc-hawk-backend:scan-test
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy — HIGH (advisory, SARIF upload)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arc-hawk-backend:scan-test
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          severity: HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
