name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== LINT & TEST ====================

  lint-backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth safety gate
        run: |
          if grep -rq "AUTH_REQUIRED=false" apps/backend/.env* 2>/dev/null && \
             grep -rq "GIN_MODE=release"    apps/backend/.env* 2>/dev/null; then
            echo "FATAL: AUTH_REQUIRED=false with GIN_MODE=release" && exit 1
          fi
          echo "Auth safety gate passed"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/backend/go.sum

      - name: Download dependencies
        working-directory: apps/backend
        run: go mod download

      - name: Vet
        working-directory: apps/backend
        run: go vet ./...

      - name: Test
        working-directory: apps/backend
        # TestContainerSmokeTest / TestTruncateAll require a live DB — integration only
        run: go test ./... -short -skip "TestContainerSmokeTest|TestTruncateAll"

  lint-frontend:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: apps/frontend
        # --legacy-peer-deps: @testing-library/react@13 declares react@^18 peer dep
        # but project uses react@19 (fully compatible at runtime)
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: apps/frontend
        run: npm run lint

  lint-go-scanner:
    name: Scanner — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/goScanner/go.sum

      - name: Vet
        working-directory: apps/goScanner
        run: go vet ./...

      - name: Test
        working-directory: apps/goScanner
        run: go test ./... -short

  # ==================== BUILD ====================

  build-backend:
    name: Backend — Docker Build
    needs: lint-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: false
          load: true
          tags: arc-hawk-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Frontend — Docker Build
    needs: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: false
          load: true
          tags: arc-hawk-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-go-scanner:
    name: Scanner — Docker Build
    needs: lint-go-scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Go Scanner Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/goScanner
          push: false
          load: true
          tags: arc-hawk-go-scanner:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== INTEGRATION TESTS ====================

  integration-tests:
    name: Integration Tests
    needs: [build-backend, build-go-scanner]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arc_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/backend/go.sum

      - name: Wait for PostgreSQL
        run: |
          timeout 60 bash -c 'until pg_isready -h localhost -p 5432; do sleep 2; done'
          echo "PostgreSQL ready"

      - name: Run Integration Tests
        working-directory: apps/backend
        # Neo4j not available in CI — lineage uses NoOpLineageSync in tests
        run: go test ./... -tags=integration -v -timeout 5m
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: arc_platform
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/arc_platform?sslmode=disable
          NEO4J_ENABLED: "false"

  # ==================== PUSH IMAGES (main branch only) ====================

  push-images:
    name: Push Docker Images
    needs: [build-backend, build-frontend, build-go-scanner, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Backend — metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/arc-hawk-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Backend — push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend — metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/arc-hawk-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Frontend — push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scanner — metadata
        id: meta-scanner
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/arc-hawk-go-scanner
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Scanner — push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/goScanner
          push: true
          tags: ${{ steps.meta-scanner.outputs.tags }}
          labels: ${{ steps.meta-scanner.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== DEPLOY (manual trigger only) ====================

  deploy:
    name: Deploy
    needs: push-images
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/arc-hawk
            git pull origin main
            docker-compose pull
            docker-compose up -d
            echo "Deployment complete!"
