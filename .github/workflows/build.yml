name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/backend/go.sum

      - name: Download dependencies
        working-directory: apps/backend
        run: go mod download

      - name: Vet
        working-directory: apps/backend
        run: go vet ./...

      - name: Test
        working-directory: apps/backend
        # Skip TestContainerSmokeTest/TestTruncateAll — require a real DB (integration tests)
        run: go test ./... -short -skip "TestContainerSmokeTest|TestTruncateAll"

      - name: Build
        working-directory: apps/backend
        run: go build ./cmd/server

  scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/goScanner/go.sum

      - name: Download dependencies
        working-directory: apps/goScanner
        run: go mod download

      - name: Vet
        working-directory: apps/goScanner
        run: go vet ./...

      - name: Test
        working-directory: apps/goScanner
        run: go test ./... -short

      - name: Build
        working-directory: apps/goScanner
        run: go build ./cmd/scanner

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: apps/frontend
        # --legacy-peer-deps: @testing-library/react@13 declares react@^18 peer dep
        # but project uses react@19 (fully compatible at runtime)
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: apps/frontend
        run: npm run lint

      - name: Build
        working-directory: apps/frontend
        run: npm run build
