apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: arc-hawk-dd-alerts
  namespace: hawk
  labels:
    app.kubernetes.io/name: arc-hawk-dd
    app.kubernetes.io/part-of: arc-hawk-dd
    release: prometheus
spec:
  groups:
    - name: arc-hawk-dd.celery
      rules:
        - alert: DLQDepthHigh
          expr: |
            celery_queue_length{queue=~".*\\.dlq"} > 100
          for: 5m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "Dead-letter queue depth exceeds 100"
            description: "Queue {{ $labels.queue }} has {{ $value }} messages in the DLQ for more than 5 minutes."
            runbook_url: "https://wiki.internal/runbooks/hawk/dlq-depth"

    - name: arc-hawk-dd.scanning
      rules:
        - alert: ScanFailureRateHigh
          expr: |
            (
              sum(rate(scan_tasks_failed_total[5m]))
              /
              (sum(rate(scan_tasks_completed_total[5m])) + sum(rate(scan_tasks_failed_total[5m])))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
            team: hawk
          annotations:
            summary: "Scan failure rate exceeds 5%"
            description: "Scan failure rate is {{ $value | humanizePercentage }} over the last 5 minutes."
            runbook_url: "https://wiki.internal/runbooks/hawk/scan-failure-rate"

        - alert: ScannerAPILatencyP99High
          expr: |
            histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service="scanner"}[5m])) by (le))
            > 5
          for: 5m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "Scanner API P99 latency exceeds 5 seconds"
            description: "Scanner API P99 latency is {{ $value }}s over the last 5 minutes."
            runbook_url: "https://wiki.internal/runbooks/hawk/scanner-latency"

    - name: arc-hawk-dd.agents
      rules:
        - alert: AgentOffline
          expr: |
            time() - max(agent_last_heartbeat_timestamp) by (agent_id) > 86400
          for: 10m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "Agent offline for more than 24 hours"
            description: "Agent {{ $labels.agent_id }} has not sent a heartbeat in {{ $value | humanizeDuration }}."
            runbook_url: "https://wiki.internal/runbooks/hawk/agent-offline"

    - name: arc-hawk-dd.risk
      rules:
        - alert: RiskTierChange
          expr: |
            changes(data_asset_risk_tier[1h]) > 0
          labels:
            severity: info
            team: hawk
          annotations:
            summary: "Risk tier change detected"
            description: "Asset {{ $labels.asset_id }} risk tier changed to {{ $labels.risk_tier }}."

    - name: arc-hawk-dd.pods
      rules:
        - alert: PodRestartFrequent
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="hawk"}[15m]) > 3
          for: 1m
          labels:
            severity: warning
            team: hawk
          annotations:
            summary: "Pod restarting frequently"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last 15 minutes."
            runbook_url: "https://wiki.internal/runbooks/hawk/pod-restarts"
