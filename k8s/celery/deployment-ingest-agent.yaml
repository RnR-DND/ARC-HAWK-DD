# LEGACY: These manifests reference Python Celery workers that have no active
# implementation in the current Go-based architecture. ARC-HAWK-DD's scanner
# pipeline runs as Go services; these Kubernetes resources are placeholders.
# Do NOT deploy without first implementing the backing Celery application code,
# or replace with the Go-native worker pattern. See TODO.md (F-23).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-ingest-agent
  namespace: hawk
  labels:
    app.kubernetes.io/name: arc-hawk-dd
    app.kubernetes.io/component: celery-worker-ingest-agent
    app.kubernetes.io/part-of: arc-hawk-dd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: arc-hawk-dd
      app.kubernetes.io/component: celery-worker-ingest-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arc-hawk-dd
        app.kubernetes.io/component: celery-worker-ingest-agent
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: celery-worker
          image: arc-platform/scanner:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.tasks.celery_app
            - worker
            - -Q
            - ingest_agent
            - --concurrency=4
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: scanner-secrets
                  key: REDIS_URL
            - name: BACKEND_URL
              value: "http://backend:8080"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.tasks.celery_app
                - inspect
                - ping
                - --timeout=10
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 15
          readinessProbe:
            exec:
              command:
                - celery
                - -A
                - app.tasks.celery_app
                - inspect
                - ping
                - --timeout=10
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 15
      volumes:
        - name: tmp
          emptyDir: {}
