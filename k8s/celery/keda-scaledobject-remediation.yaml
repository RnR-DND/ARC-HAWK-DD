# LEGACY: These manifests reference Python Celery workers that have no active
# implementation in the current Go-based architecture. ARC-HAWK-DD's scanner
# pipeline runs as Go services; these Kubernetes resources are placeholders.
# Do NOT deploy without first implementing the backing Celery application code,
# or replace with the Go-native worker pattern. See TODO.md (F-23).

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: celery-worker-remediation-scaler
  namespace: hawk
  labels:
    app.kubernetes.io/name: arc-hawk-dd
    app.kubernetes.io/component: celery-worker-remediation
spec:
  scaleTargetRef:
    name: celery-worker-remediation
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 2
  maxReplicaCount: 20
  triggers:
    - type: redis
      metadata:
        address: redis.hawk.svc.cluster.local:6379
        listName: remediation
        listLength: "50"
        activationListLength: "1"
