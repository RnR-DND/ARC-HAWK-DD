apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hawk-frontend
  namespace: hawk
  labels:
    app.kubernetes.io/name: hawk-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: hawk
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hawk-frontend
  namespaceSelector:
    matchNames:
      - hawk
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
