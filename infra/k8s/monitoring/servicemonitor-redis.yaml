apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hawk-redis
  namespace: hawk
  labels:
    app.kubernetes.io/name: hawk-redis
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: hawk
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hawk-redis
  namespaceSelector:
    matchNames:
      - hawk
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "redis_.*"
          action: keep
