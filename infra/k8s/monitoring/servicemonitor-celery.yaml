# LEGACY: These manifests reference Python Celery workers that have no active
# implementation in the current Go-based architecture. ARC-HAWK-DD's scanner
# pipeline runs as Go services; these Kubernetes resources are placeholders.
# Do NOT deploy without first implementing the backing Celery application code,
# or replace with the Go-native worker pattern. See TODO.md (F-23).

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hawk-celery
  namespace: hawk
  labels:
    app.kubernetes.io/name: hawk-celery
    app.kubernetes.io/component: celery
    app.kubernetes.io/part-of: hawk
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: celery
  namespaceSelector:
    matchNames:
      - hawk
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "celery_.*"
          action: keep
        - sourceLabels: [__name__]
          regex: "flower_.*"
          action: keep
