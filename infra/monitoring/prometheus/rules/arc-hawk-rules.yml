groups:
  - name: arc-hawk.rules
    rules:
      - alert: ScanExecutionFailure
        expr: rate(scan_trigger_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          service: arc-hawk-api
        annotations:
          summary: "Scan executions are failing"
          description: "More than 0 scan trigger failures detected in the last 5 minutes"

      - alert: ScanTimeout
        expr: histogram_quantile(0.95, rate(scan_trigger_duration_seconds_bucket[10m])) > 1800
        for: 1m
        labels:
          severity: warning
          service: arc-hawk-api
        annotations:
          summary: "Scan execution timeout"
          description: "P95 scan trigger duration exceeding 30 minutes"

      - alert: HighScanFailureRate
        expr: rate(scan_trigger_failures_total[5m]) / (rate(scan_trigger_total[5m]) + 0.001) > 0.05
        for: 2m
        labels:
          severity: critical
          service: arc-hawk-api
        annotations:
          summary: "High scan failure rate"
          description: "Scan failure rate above 5% over the last 5 minutes"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 1073741824
        for: 1m
        labels:
          severity: warning
          service: arc-hawk-api
        annotations:
          summary: "High memory usage"
          description: "Resident memory exceeds 1GB"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 1m
        labels:
          severity: warning
          service: arc-hawk-api
        annotations:
          summary: "High CPU usage"
          description: "CPU usage above 80% for more than 1 minute"

      - alert: RemediationFailureRate
        expr: rate(remediation_actions_failed_total[5m]) > 0.2
        for: 1m
        labels:
          severity: critical
          service: arc-hawk-api
        annotations:
          summary: "High remediation failure rate"
          description: "Remediation failure rate above 20% in the last 5 minutes"

      - alert: ScannerServiceDown
        expr: up{job="arc-hawk-scanner"} == 0
        for: 1m
        labels:
          severity: critical
          service: arc-hawk-scanner
        annotations:
          summary: "Scanner service is down"
          description: "PII scanner service is not responding"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 1m
        labels:
          severity: warning
          service: node
        annotations:
          summary: "Low disk space"
          description: "Available disk space below 10%"

      - alert: LowClassificationConfidence
        expr: histogram_quantile(0.50, rate(classification_confidence_bucket[10m])) < 0.7
        for: 5m
        labels:
          severity: warning
          service: arc-hawk-scanner
        annotations:
          summary: "Low median classification confidence"
          description: "Median classification confidence below 70% — possible data quality issue or noisy source"

      - alert: FindingIngestionStalled
        expr: rate(findings_ingested_total[10m]) == 0
        for: 15m
        labels:
          severity: warning
          service: arc-hawk-api
        annotations:
          summary: "No findings being ingested"
          description: "No new findings ingested in 15 minutes — scanner may be stalled or no scans running"
