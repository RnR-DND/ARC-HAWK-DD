# Default values for arc-hawk-dd Helm chart.
# Override per environment with values.prod.yaml.

global:
  imageRegistry: ""          # e.g. "registry.example.com/" — prepended to all images
  imagePullSecrets: []
  storageClass: ""           # leave empty to use cluster default

# ---------------------------------------------------------------------------
# Backend (Go API)
# ---------------------------------------------------------------------------
backend:
  enabled: true
  image:
    repository: arc-platform/backend
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests: { cpu: "250m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }
  service:
    type: ClusterIP
    port: 8080
  env:
    AUTH_REQUIRED: "true"
    LOG_LEVEL: "info"
  # Secrets — set via --set or external secrets manager
  secrets:
    DATABASE_URL: ""
    JWT_SECRET: ""
    ENCRYPTION_KEY: ""       # 32 bytes, base64-encoded
    NEO4J_URI: ""
    NEO4J_USER: ""
    NEO4J_PASSWORD: ""
    REDIS_URL: ""
    TEMPORAL_HOST: ""
  livenessProbe:
    httpGet: { path: /health, port: 8080 }
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet: { path: /health, port: 8080 }
    initialDelaySeconds: 10
    periodSeconds: 10

# ---------------------------------------------------------------------------
# Frontend (Next.js)
# ---------------------------------------------------------------------------
frontend:
  enabled: true
  image:
    repository: arc-platform/frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  service:
    type: ClusterIP
    port: 3000
  env:
    NEXT_PUBLIC_API_URL: "http://backend:8080"
  livenessProbe:
    httpGet: { path: /, port: 3000 }
    initialDelaySeconds: 20
    periodSeconds: 30
  readinessProbe:
    httpGet: { path: /, port: 3000 }
    initialDelaySeconds: 15
    periodSeconds: 10

# ---------------------------------------------------------------------------
# Scanner (Python/Flask)
# ---------------------------------------------------------------------------
scanner:
  enabled: true
  image:
    repository: arc-platform/scanner
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "2Gi" }
  service:
    type: ClusterIP
    port: 8000
  env:
    REDIS_URL: ""
    ANTHROPIC_API_KEY: ""
    BACKEND_URL: "http://backend:8080"
  livenessProbe:
    httpGet: { path: /health, port: 8000 }
    initialDelaySeconds: 30
    periodSeconds: 20
  readinessProbe:
    httpGet: { path: /health, port: 8000 }
    initialDelaySeconds: 20
    periodSeconds: 10

# ---------------------------------------------------------------------------
# PostgreSQL
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "15-alpine"
  persistence:
    enabled: true
    size: 50Gi
  auth:
    database: archawk
    username: archawk
    password: ""             # set via --set postgresql.auth.password=<secret>
  resources:
    requests: { cpu: "500m", memory: "512Mi" }
    limits:   { cpu: "2",    memory: "2Gi" }
  livenessProbe:
    exec:
      command: ["pg_isready", "-U", "archawk"]
    initialDelaySeconds: 30
    periodSeconds: 10

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  persistence:
    enabled: false           # Redis is used for ephemeral state; disable for HA clusters
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
  livenessProbe:
    exec:
      command: ["redis-cli", "ping"]
    initialDelaySeconds: 10
    periodSeconds: 10

# ---------------------------------------------------------------------------
# Neo4j (Data Lineage)
# ---------------------------------------------------------------------------
neo4j:
  enabled: true
  image:
    repository: neo4j
    tag: "5.15-community"
  persistence:
    enabled: true
    size: 20Gi
  auth:
    password: ""             # set via --set neo4j.auth.password=<secret>
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "2Gi" }
  livenessProbe:
    httpGet: { path: /, port: 7474 }
    initialDelaySeconds: 60
    periodSeconds: 20

# ---------------------------------------------------------------------------
# Vault (Credential Lifecycle — optional)
# ---------------------------------------------------------------------------
vault:
  enabled: false
  image:
    repository: hashicorp/vault
    tag: "1.15"
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  service:
    type: ClusterIP
    port: 8200
  dev:
    enabled: true              # Use dev mode for non-prod (auto-unseal, in-memory)
    rootToken: ""              # set via --set vault.dev.rootToken=<secret>
  # Production: use Vault Agent Injector or external Vault cluster
  # Set vault.dev.enabled=false and configure vault.externalAddr instead
  externalAddr: ""             # e.g. "https://vault.internal:8200"
  livenessProbe:
    exec:
      command: ["vault", "status"]

# ---------------------------------------------------------------------------
# Supermemory.ai (Memory & Hybrid-Search — optional)
# ---------------------------------------------------------------------------
# Free tier: 1M tokens/month + 10K search queries/month.
# When disabled, all /api/v1/memory/* calls return 503 and scan hooks no-op.
# API key lives in a Kubernetes secret (helm --set-file or sealed-secrets).
supermemory:
  enabled: false
  apiUrl: "https://api.supermemory.ai"
  # secretName: reference to a pre-created Secret containing key "api-key"
  # create with: kubectl create secret generic supermemory --from-literal=api-key=sm_...
  secretName: "supermemory"
    initialDelaySeconds: 10
    periodSeconds: 10

# ---------------------------------------------------------------------------
# Temporal (Workflow Engine)
# ---------------------------------------------------------------------------
temporal:
  enabled: true
  image:
    repository: temporalio/auto-setup
    tag: "1.22.0"
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }
  ui:
    enabled: true
    image:
      repository: temporalio/ui
      tag: "2.21.0"
    service:
      type: ClusterIP
      port: 8080

# ---------------------------------------------------------------------------
# Presidio (ML PII Detection — Layer 2)
# ---------------------------------------------------------------------------
presidio:
  enabled: true
  image:
    repository: mcr.microsoft.com/presidio-analyzer
    tag: "latest"
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "2Gi" }
  service:
    type: ClusterIP
    port: 3000
  livenessProbe:
    httpGet: { path: /health, port: 3000 }
    initialDelaySeconds: 30
    periodSeconds: 20

# ---------------------------------------------------------------------------
# Prometheus (Metrics)
# ---------------------------------------------------------------------------
prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "latest"
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests: { cpu: "250m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }
  service:
    type: ClusterIP
    port: 9090

# ---------------------------------------------------------------------------
# Grafana (Dashboards)
# ---------------------------------------------------------------------------
grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "latest"
  persistence:
    enabled: true
    size: 5Gi
  adminPassword: ""          # set via --set grafana.adminPassword=<secret>
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  service:
    type: ClusterIP
    port: 3000

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: arc-hawk.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls: []

# ---------------------------------------------------------------------------
# Celery Workers (per-queue configuration)
# ---------------------------------------------------------------------------
celeryWorkers:
  enabled: true
  defaults:
    replicaCount: 2
    concurrency: 4
    imagePullPolicy: IfNotPresent
    resources:
      requests: { cpu: "500m", memory: "1Gi" }
      limits:   { cpu: "2",    memory: "2Gi" }
  keda:
    enabled: true
    pollingInterval: 15
    cooldownPeriod: 120
    minReplicaCount: 2
    maxReplicaCount: 20
    listLength: 50
    redisAddress: "redis.hawk.svc.cluster.local:6379"
  queues:
    scan_default:
      replicaCount: 2
      concurrency: 4
    classify:
      replicaCount: 2
      concurrency: 4
    ingest_streaming:
      replicaCount: 2
      concurrency: 4
    ingest_cloud:
      replicaCount: 2
      concurrency: 4
    ingest_agent:
      replicaCount: 2
      concurrency: 4
    remediation:
      replicaCount: 2
      concurrency: 4
    escalation:
      replicaCount: 2
      concurrency: 2

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false
  arcNamespace: arc
  keycloakPort: 8180
  externalEgressPorts:
    - 443
    - 80
    - 5432
    - 3306
    - 1433
    - 27017

# ---------------------------------------------------------------------------
# Pod Disruption Budgets
# ---------------------------------------------------------------------------
podDisruptionBudgets:
  enabled: true
  budgets:
    postgresql:
      minAvailable: 1
    neo4j:
      minAvailable: 2
    redis:
      minAvailable: 2
    backend:
      minAvailable: 2
    scanner:
      minAvailable: 2

# ---------------------------------------------------------------------------
# Monitoring (ServiceMonitors & Alerts)
# ---------------------------------------------------------------------------
monitoring:
  serviceMonitors:
    enabled: false
    interval: "15s"
    scrapeTimeout: "10s"
    releaseLabel: "prometheus"
  alerts:
    enabled: false
    releaseLabel: "prometheus"
    thresholds:
      dlqDepth: 100
      scanFailureRate: 0.05
      scannerLatencyP99Seconds: 5
      agentOfflineSeconds: 86400
      podRestartCount: 3

# ---------------------------------------------------------------------------
# Service Account & RBAC
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}
