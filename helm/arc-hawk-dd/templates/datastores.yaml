{{/* Neo4j */}}
{{- if .Values.neo4j.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arc-hawk-dd.fullname" . }}-neo4j-secret
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
type: Opaque
stringData:
  NEO4J_AUTH: {{ printf "neo4j/%s" .Values.neo4j.auth.password | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "arc-hawk-dd.fullname" . }}-neo4j
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "neo4j") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "neo4j") | nindent 8 }}
    spec:
      containers:
        - name: neo4j
          image: "{{ .Values.neo4j.image.repository }}:{{ .Values.neo4j.image.tag }}"
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          envFrom:
            - secretRef:
                name: {{ include "arc-hawk-dd.fullname" . }}-neo4j-secret
          resources: {{- toYaml .Values.neo4j.resources | nindent 12 }}
          livenessProbe: {{- toYaml .Values.neo4j.livenessProbe | nindent 12 }}
          {{- if .Values.neo4j.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
  {{- if .Values.neo4j.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "neo4j") | nindent 4 }}
  ports:
    - port: 7474
      targetPort: 7474
      name: http
    - port: 7687
      targetPort: 7687
      name: bolt
{{- end }}
