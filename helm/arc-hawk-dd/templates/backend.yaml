{{- if .Values.backend.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arc-hawk-dd.fullname" . }}-backend-secrets
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.backend.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arc-hawk-dd.fullname" . }}-backend
  labels:
    {{- include "arc-hawk-dd.labels" . | nindent 4 }}
    {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "backend") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "arc-hawk-dd.image" (dict "root" . "repo" .Values.backend.image.repository "tag" .Values.backend.image.tag) }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "arc-hawk-dd.fullname" . }}-backend-secrets
          resources: {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe: {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe: {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "backend") | nindent 4 }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
      name: http
{{- end }}
