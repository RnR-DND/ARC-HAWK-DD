  replicas: 1
  selector:
    matchLabels:
      {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "presidio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "presidio") | nindent 8 }}
    spec:
      containers:
        - name: presidio
          image: "{{ .Values.presidio.image.repository }}:{{ .Values.presidio.image.tag }}"
          ports:
            - containerPort: {{ .Values.presidio.service.port }}
          resources: {{- toYaml .Values.presidio.resources | nindent 12 }}
