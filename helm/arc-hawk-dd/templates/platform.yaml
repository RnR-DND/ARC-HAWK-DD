{{/* Temporal */}}
{{- if .Values.temporal.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arc-hawk-dd.fullname" . }}-temporal
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "temporal") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "temporal") | nindent 8 }}
    spec:
      containers:
        - name: temporal
          image: "{{ .Values.temporal.image.repository }}:{{ .Values.temporal.image.tag }}"
          ports:
            - containerPort: 7233
              name: grpc
          env:
            - name: DB
              value: postgresql
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "arc-hawk-dd.fullname" . }}-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "arc-hawk-dd.fullname" . }}-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_SEEDS
              value: postgresql
          resources: {{- toYaml .Values.temporal.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "temporal") | nindent 4 }}
  ports:
    - port: 7233
      targetPort: 7233
      name: grpc
---
{{- if .Values.temporal.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arc-hawk-dd.fullname" . }}-temporal-ui
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "temporal-ui") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "temporal-ui") | nindent 8 }}
    spec:
      containers:
        - name: temporal-ui
          image: "{{ .Values.temporal.ui.image.repository }}:{{ .Values.temporal.ui.image.tag }}"
          ports:
            - containerPort: {{ .Values.temporal.ui.service.port }}
          env:
            - name: TEMPORAL_ADDRESS
              value: "temporal:7233"
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "temporal-ui") | nindent 4 }}
  ports:
    - port: {{ .Values.temporal.ui.service.port }}
      targetPort: {{ .Values.temporal.ui.service.port }}
{{- end }}
{{- end }}

{{/* Presidio */}}
