      targetPort: {{ .Values.presidio.service.port }}
{{- end }}

{{/* Prometheus */}}
{{- if .Values.prometheus.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "arc-hawk-dd.fullname" . }}-prometheus
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  serviceName: prometheus
  replicas: 1
  selector:
    matchLabels:
      {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "prometheus") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "prometheus") | nindent 8 }}
    spec:
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          args: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=30d"]
          ports:
            - containerPort: {{ .Values.prometheus.service.port }}
          resources: {{- toYaml .Values.prometheus.resources | nindent 12 }}
          {{- if .Values.prometheus.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /prometheus
          {{- end }}
  {{- if .Values.prometheus.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.prometheus.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "prometheus") | nindent 4 }}
  ports:
    - port: {{ .Values.prometheus.service.port }}
      targetPort: {{ .Values.prometheus.service.port }}
{{- end }}

{{/* Grafana */}}
{{- if .Values.grafana.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arc-hawk-dd.fullname" . }}-grafana-secret
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
type: Opaque
stringData:
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.grafana.adminPassword | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "arc-hawk-dd.fullname" . }}-grafana
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  serviceName: grafana
  replicas: 1
  selector:
    matchLabels:
      {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "grafana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "grafana") | nindent 8 }}
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          ports:
            - containerPort: {{ .Values.grafana.service.port }}
          envFrom:
            - secretRef:
                name: {{ include "arc-hawk-dd.fullname" . }}-grafana-secret
          resources: {{- toYaml .Values.grafana.resources | nindent 12 }}
          {{- if .Values.grafana.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          {{- end }}
  {{- if .Values.grafana.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.grafana.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels: {{- include "arc-hawk-dd.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "arc-hawk-dd.selectorLabels" (dict "root" . "component" "grafana") | nindent 4 }}
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: {{ .Values.grafana.service.port }}
{{- end }}
