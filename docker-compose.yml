version: '3.8'

networks:
  arc-platform-internal:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.29.0.0/16

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  scanner-config:

services:
  postgres:
    image: postgres:15-alpine
    container_name: arc-platform-db
    networks:
      arc-platform-internal:
        ipv4_address: 172.29.0.10
    environment:
      #POSTGRES_USER: ${POSTGRES_USER}
      #POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      #POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arc_platform
    # Restrict to localhost to prevent external access
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/migrations_versioned:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    container_name: arc-platform-neo4j
    networks:
      arc-platform-internal:
        ipv4_address: 172.29.0.11
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_max__size: 512M
    # Restrict to localhost
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -u neo4j -p password123 'RETURN 1'" ]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: arc-platform-presidio
    networks:
      arc-platform-internal:
        ipv4_address: 172.29.0.12
    # Removed host port mapping - purely internal service
    ports:
      - "3001:3000"
    environment:
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/health')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: arc-platform-temporal
    networks:
      arc-platform-internal:
        ipv4_address: 172.29.0.13
    # Restrict to localhost
    ports:
      - "127.0.0.1:7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=${TEMPORAL_DB_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: [ "CMD", "curl","-f","http://localhost:8233" ]
      interval: 30s
      timeout: 1s
      retries: 5
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.21.0
    container_name: arc-platform-temporal-ui
    networks:
      arc-platform-internal:
        ipv4_address: 172.29.0.14
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_HOST_PORT}
      - TEMPORAL_CORS_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      - temporal

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: arc-platform-backend
    networks:
      arc-platform-internal:
        ipv4_address: 172.29.0.20
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - PRESIDIO_ADDR=${PRESIDIO_ADDR}
      - TEMPORAL_HOST_PORT=${TEMPORAL_HOST_PORT}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SCANNER_URL=${SCANNER_URL}
      - ARC_HAWK_ROOT=/app
      - SCANNER_CONFIG_PATH=/app/config/connection.yml
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - ./apps/scanner/config:/app/config

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: arc-platform-frontend
    networks:
      arc-platform-internal:
        ipv4_address: 172.29.0.30
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080/api/v1
    depends_on:
      - backend

  scanner:
    build:
      context: ./apps/scanner
      dockerfile: Dockerfile
    container_name: arc-platform-scanner
    networks:
      arc-platform-internal:
        ipv4_address: 172.29.0.40
    ports:
      - "5002:8080"
    environment:
      - BACKEND_URL=${BACKEND_URL}
      - PORT=${PORT}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ./scripts:/app/scripts
      - /tmp:/tmp
      - ./apps/scanner:/app
      - ./testdata:/app/testdata
    depends_on:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: arc-platform-prometheus
    networks:
      arc-platform-internal:
        ipv4_address: 172.29.0.50
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: arc-platform-grafana
    networks:
      arc-platform-internal:
        ipv4_address: 172.29.0.51
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
