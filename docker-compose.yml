
networks:
  arc-platform-internal:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.31.240.0/24

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  vault_data:
  redis_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: arc-platform-db
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.10
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Restrict to localhost to prevent external access
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    container_name: arc-platform-neo4j
    # unless-stopped covers on-failure; neo4j 5.x with APOC exits(1) on first
    # start after plugin install then restarts cleanly — this handles that.
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.11
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_max__size: 512M
    # Restrict to localhost
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: arc-platform-presidio
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.12
    # Internal-only — reachable from backend/scanner on the Docker network.
    # No host port mapping: anonymous HTTP access from the host or wider
    # network would expose the PII analyzer to unrestricted callers.
    expose:
      - "3000"
    environment:
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: arc-platform-temporal
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.13
    # Restrict to localhost
    ports:
      - "127.0.0.1:7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=${TEMPORAL_DB_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "tctl --address localhost:7233 cluster health || curl -sf http://localhost:7233 || true"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  temporal-ui:
    image: temporalio/ui:2.21.0
    container_name: arc-platform-temporal-ui
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.14
    # Bind to loopback only — Temporal UI has no auth; do not expose to the
    # wider network. Access via SSH tunnel in prod, or localhost in dev.
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_HOST_PORT}
      - TEMPORAL_CORS_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      - temporal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  vault:
    image: hashicorp/vault:1.15
    container_name: arc-platform-vault
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.15
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:?VAULT_DEV_ROOT_TOKEN must be set — no insecure default permitted}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      # Point the vault CLI (used by the healthcheck) at the dev-mode HTTP
      # listener; default is https://127.0.0.1:8200 which fails against an
      # http-only dev server.
      VAULT_ADDR: "http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: arc-platform-redis
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.16
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: arc-platform-backend
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.20
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - PRESIDIO_ADDR=http://presidio-analyzer:3000
      - TEMPORAL_HOST_PORT=temporal:7233
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SCANNER_URL=http://go-scanner:8001
      - ARC_HAWK_ROOT=/app
      - PORT=8080
      - VAULT_ENABLED=${VAULT_ENABLED:-false}
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_DEV_ROOT_TOKEN:?VAULT_DEV_ROOT_TOKEN must be set — no insecure default permitted}
      - VAULT_SECRET_MOUNT=secret
      # Remediation safety gate. Connectors are currently stubs that report
      # success without mutating source data. Set to true ONLY after verified
      # connector implementations are in place.
      - REMEDIATION_ENABLED=${REMEDIATION_ENABLED:-false}
      # Shared service token for backend ↔ go-scanner authentication (P0-2).
      - SCANNER_SERVICE_TOKEN=${SCANNER_SERVICE_TOKEN:-dev-scanner-token-change-me}
      # Memory layer (supermemory.ai). Free tier: 1M tokens/mo + 10K queries/mo.
      # When SUPERMEMORY_ENABLED!=true or key missing, all memory calls become no-ops.
      - SUPERMEMORY_ENABLED=${SUPERMEMORY_ENABLED:-false}
      - SUPERMEMORY_API_KEY=${SUPERMEMORY_API_KEY:-}
      - SUPERMEMORY_API_URL=${SUPERMEMORY_API_URL:-https://api.supermemory.ai}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      temporal:
        condition: service_started
      go-scanner:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: arc-platform-frontend
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.30
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080/api/v1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  go-scanner:
    build:
      context: ./apps/goScanner
      dockerfile: Dockerfile
    container_name: arc-platform-go-scanner
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.41
    # Port 8001 is NOT published to the host. Scanner is reachable only
    # from the internal network (by backend). This prevents an attacker on
    # the host network from bypassing scanner auth.
    expose:
      - "8001"
    environment:
      - PORT=8001
      - LOG_LEVEL=info
      - BACKEND_URL=http://backend:8080
      - PRESIDIO_URL=http://presidio-analyzer:3000
      # Must match backend SCANNER_SERVICE_TOKEN. See P0-2 in system audit.
      - SCANNER_SERVICE_TOKEN=${SCANNER_SERVICE_TOKEN:-dev-scanner-token-change-me}
      # Wall-clock cap on any single scan (seconds).
      - SCAN_TIMEOUT_SECONDS=${SCAN_TIMEOUT_SECONDS:-1800}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: arc-platform-prometheus
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.50
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: arc-platform-grafana
    restart: unless-stopped
    networks:
      arc-platform-internal:
        ipv4_address: 172.31.240.51
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
