basePath: /api/v1
definitions:
  gin.H:
    additionalProperties: {}
    type: object
  github_com_arc-platform_backend_modules_compliance_service.ConsentBasis:
    enum:
    - explicit
    - legitimate_interest
    - contractual
    - legal_obligation
    type: string
    x-enum-varnames:
    - ConsentBasisExplicit
    - ConsentBasisLegitimateInterest
    - ConsentBasisContractual
    - ConsentBasisLegalObligation
  github_com_arc-platform_backend_modules_compliance_service.ConsentRequest:
    properties:
      asset_id:
        type: string
      consent_basis:
        $ref: '#/definitions/github_com_arc-platform_backend_modules_compliance_service.ConsentBasis'
      consent_expires_at:
        type: string
      consent_obtained_at:
        type: string
      metadata:
        additionalProperties: true
        type: object
      obtained_by:
        type: string
      pii_type:
        type: string
      purpose:
        type: string
    required:
    - asset_id
    - consent_basis
    - consent_obtained_at
    - obtained_by
    - pii_type
    - purpose
    type: object
  github_com_arc-platform_backend_modules_compliance_service.ConsentWithdrawalRequest:
    properties:
      withdrawal_reason:
        type: string
      withdrawal_requested_by:
        type: string
    required:
    - withdrawal_requested_by
    type: object
  github_com_arc-platform_backend_modules_connections_service.ConnectionTestResult:
    properties:
      database_info:
        type: string
      error_details:
        type: string
      message:
        type: string
      response_time_ms:
        type: integer
      server_version:
        type: string
      source_type:
        type: string
      success:
        type: boolean
    type: object
  github_com_arc-platform_backend_modules_scanning_service.CustomPattern:
    properties:
      auto_deactivated:
        type: boolean
      backtrack_safe:
        type: boolean
      category:
        type: string
      context_keywords:
        description: 'WS4: context keyword boosting for custom patterns (migration
          000038)'
        items:
          type: string
        type: array
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      display_name:
        type: string
      false_positive_count:
        description: 'Phase 2: false-positive tracking (migration 000036)'
        type: integer
      false_positive_rate:
        type: number
      id:
        type: string
      is_active:
        type: boolean
      last_matched_at:
        type: string
      match_count_lifetime:
        type: integer
      name:
        type: string
      negative_keywords:
        items:
          type: string
        type: array
      regex:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
      validation_status:
        description: 'Phase 2: regex engine hardening'
        type: string
    type: object
  github_com_arc-platform_backend_modules_scanning_service.TriggerScanRequest:
    properties:
      classification_mode:
        description: |-
          ClassificationMode controls which detection engines the scanner uses.
          Options: "regex" (regex only), "ner" (regex+spaCy NER), "contextual" (regex+NER+contextual).
          Default (empty) = "contextual" (all engines enabled).
        type: string
      custom_patterns:
        description: CustomPatterns are user-defined patterns appended to the scan;
          populated by backend at trigger time.
        items:
          additionalProperties: {}
          type: object
        type: array
      execution_mode:
        enum:
        - sequential
        - parallel
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      pii_types:
        items:
          type: string
        minItems: 1
        type: array
      pii_types_per_source:
        additionalProperties:
          items:
            type: string
          type: array
        description: |-
          PIITypesPerSource maps profile_name → PII types for that source.
          When set, overrides the global PIITypes for the specified sources.
          Sources not listed here fall back to the global PIITypes.
        type: object
      sources:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - execution_mode
    - name
    - pii_types
    - sources
    type: object
  modules_compliance_api.createConsentRequest:
    properties:
      asset_id:
        type: string
      consent_expires_at:
        type: string
      consent_given_at:
        type: string
      consent_mechanism:
        description: 'ConsentMechanism must be one of: explicit, implicit, legitimate_interest'
        type: string
      data_subject_id:
        type: string
      purpose:
        type: string
    required:
    - consent_given_at
    - consent_mechanism
    - data_subject_id
    - purpose
    type: object
  modules_compliance_api.groSettings:
    properties:
      gro_email:
        type: string
      gro_name:
        type: string
      gro_phone:
        type: string
      is_significant_data_fiduciary:
        type: boolean
    type: object
  modules_connections_api.AddConnectionRequest:
    properties:
      config:
        additionalProperties: {}
        type: object
      name:
        type: string
      profile_name:
        maxLength: 50
        minLength: 1
        type: string
      source_type:
        enum:
        - postgresql
        - mysql
        - mongodb
        - redis
        - sqlite
        - oracle
        - mssql
        - firebase
        - couchdb
        - s3
        - gcs
        - azure_blob
        - gdrive
        - gdrive_workspace
        - bigquery
        - snowflake
        - redshift
        - kafka
        - kinesis
        - filesystem
        - csv_excel
        - pdf
        - docx
        - pptx
        - html_files
        - email_files
        - parquet
        - orc
        - avro
        - scanned_images
        - text
        - slack
        - salesforce
        - hubspot
        - jira
        - ms_teams
        type: string
    required:
    - config
    - profile_name
    - source_type
    type: object
  modules_connections_api.TestConnectionRequest:
    properties:
      config:
        additionalProperties: {}
        type: object
      source_type:
        enum:
        - postgresql
        - mysql
        - mongodb
        - redis
        - sqlite
        - oracle
        - mssql
        - firebase
        - couchdb
        - s3
        - gcs
        - azure_blob
        - gdrive
        - gdrive_workspace
        - bigquery
        - snowflake
        - redshift
        - kafka
        - kinesis
        - filesystem
        - csv_excel
        - pdf
        - docx
        - pptx
        - html_files
        - email_files
        - parquet
        - orc
        - avro
        - scanned_images
        - text
        - slack
        - salesforce
        - hubspot
        - jira
        - ms_teams
        type: string
    required:
    - config
    - source_type
    type: object
  modules_remediation_api.ExecuteRemediationRequest:
    properties:
      action_type:
        enum:
        - MASK
        - DELETE
        - ENCRYPT
        type: string
      finding_ids:
        items:
          type: string
        type: array
    required:
    - action_type
    - finding_ids
    type: object
  modules_remediation_api.ExecuteRemediationResponse:
    properties:
      action_ids:
        items:
          type: string
        type: array
      errors:
        items:
          type: string
        type: array
      failed:
        type: integer
      success:
        type: integer
    type: object
  modules_scanning_api.AgentSyncBatch:
    properties:
      batch_seq:
        minimum: 0
        type: integer
      results:
        items:
          type: integer
        type: array
      scan_job_id:
        type: string
    required:
    - batch_seq
    - results
    - scan_job_id
    type: object
  modules_scanning_api.AgentSyncRequest:
    properties:
      agent_id:
        type: string
      batches:
        description: preferred field name
        items:
          $ref: '#/definitions/modules_scanning_api.AgentSyncBatch'
        type: array
      results:
        description: legacy field name (apps/agent ≤ v1)
        items:
          $ref: '#/definitions/modules_scanning_api.AgentSyncBatch'
        type: array
    required:
    - agent_id
    type: object
  modules_scanning_api.AgentSyncResponse:
    properties:
      accepted:
        type: integer
      details:
        items:
          $ref: '#/definitions/modules_scanning_api.BatchResult'
        type: array
      failed:
        type: integer
      late:
        description: arrived after job completed/cancelled
        type: integer
      skipped:
        description: duplicates
        type: integer
    type: object
  modules_scanning_api.BatchResult:
    properties:
      batch_seq:
        type: integer
      error:
        type: string
      scan_job_id:
        type: string
      status:
        description: '"accepted", "skipped", "arrived_late", "failed"'
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: security@arc-hawk.io
    name: ARC-Hawk Security Team
  description: Enterprise PII Discovery, Classification, and Lineage Tracking Platform.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://arc-hawk.io/terms
  title: ARC-HAWK-DD API
  version: 3.0.0
paths:
  /agent/sync:
    post:
      consumes:
      - application/json
      description: Idempotent batch ingestion from EDR agents. Requires X-Scanner-Token
        + X-Tenant-ID headers.
      parameters:
      - description: Scanner service token
        in: header
        name: X-Scanner-Token
        required: true
        type: string
      - description: Tenant UUID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Batch payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modules_scanning_api.AgentSyncRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modules_scanning_api.AgentSyncResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
      summary: Ingest agent scan batch (idempotent)
      tags:
      - agent
  /analytics/heatmap:
    get:
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Get PII type vs source heatmap
      tags:
      - analytics
  /analytics/risk-distribution:
    get:
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Get risk score distribution across assets
      tags:
      - analytics
  /analytics/trends:
    get:
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Lookback window in days (default 30)
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Get risk score trend over time
      tags:
      - analytics
  /api/v1/audit/logs:
    get:
      consumes:
      - application/json
      description: Returns audit logs with optional filters for event type, user,
        and time range
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filter by event type
        in: query
        name: event_type
        type: string
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Start time in RFC3339 format
        in: query
        name: from
        type: string
      - description: End time in RFC3339 format
        in: query
        name: to
        type: string
      - description: Maximum records to return
        in: query
        name: limit
        type: integer
      - description: Number of records to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: List audit logs
      tags:
      - compliance
  /api/v1/audit/recent:
    get:
      consumes:
      - application/json
      description: Returns recent activity across all users
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Get recent audit activity
      tags:
      - compliance
  /api/v1/audit/resource/{resourceType}/{resourceId}:
    get:
      consumes:
      - application/json
      description: Returns the full audit history for a specific resource by type
        and ID
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Resource type
        in: path
        name: resourceType
        required: true
        type: string
      - description: Resource ID
        in: path
        name: resourceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Get resource audit history
      tags:
      - compliance
  /api/v1/audit/user/{userId}:
    get:
      consumes:
      - application/json
      description: Returns activity summary and audit logs for a specific user
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Get user activity
      tags:
      - compliance
  /api/v1/compliance/audit-trail:
    get:
      consumes:
      - application/json
      description: Returns paginated audit ledger rows for the tenant
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filter by event type (repeatable)
        in: query
        name: event_type
        type: string
      - description: Start time in RFC3339 format
        in: query
        name: from
        type: string
      - description: End time in RFC3339 format
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Get compliance audit trail
      tags:
      - compliance
  /api/v1/compliance/consent/records:
    get:
      consumes:
      - application/json
      description: Returns paginated consent records for the tenant
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Maximum records to return (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Number of records to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: List compliance consent records
      tags:
      - compliance
    post:
      consumes:
      - application/json
      description: Creates a new consent record for a data subject
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Consent record payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modules_compliance_api.createConsentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Create a consent record
      tags:
      - compliance
  /api/v1/compliance/consent/records/{id}:
    delete:
      consumes:
      - application/json
      description: Withdraws consent by setting withdrawal_timestamp and marking inactive
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Consent record UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
