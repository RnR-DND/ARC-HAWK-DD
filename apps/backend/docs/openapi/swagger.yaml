          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Generate DPDPA HTML compliance report
      tags:
      - compliance
  /api/v1/compliance/dpr:
    get:
      consumes:
      - application/json
      description: Returns paginated list of data principal rights requests with optional
        filters
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filter by request status (PENDING, IN_PROGRESS, COMPLETED, REJECTED)
        in: query
        name: status
        type: string
      - description: Filter by request type
        in: query
        name: type
        type: string
      - description: Maximum records to return (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Number of records to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: List data principal rights requests
      tags:
      - compliance
    post:
      consumes:
      - application/json
      description: Submits a new DPDPA data principal rights request (access, correction,
        erasure, etc.)
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Data principal request payload
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Submit a data principal rights request
      tags:
      - compliance
  /api/v1/compliance/dpr/{id}/status:
    patch:
      consumes:
      - application/json
      description: Updates the status of a data principal rights request
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Request UUID
        in: path
        name: id
        required: true
        type: string
      - description: Status update payload
        in: body
        name: body
        required: true
        schema:
