  /api/v1/compliance/dpdpa/report:
    get:
      consumes:
      - application/json
      description: Returns an HTML compliance gap report suitable for print-to-PDF
      parameters:
      - description: Bearer {token}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
